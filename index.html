<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Casamento</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="hero__content">
          <p class="kicker">Nosso casamento</p>
          <h1 id="casal"></h1>
          <p class="date" id="data"></p>
          <a class="button" id="whatsapp" href="#" target="_blank" rel="noreferrer">
            Confirmar presença
          </a>
        </div>
      </section>

      <section class="section">
        <h2>Informações</h2>
        <div class="info-grid">
          <article>
            <span>Horário</span>
            <strong id="horario"></strong>
          </article>
          <article>
            <span>Local</span>
            <strong id="local"></strong>
          </article>
          <article>
            <span>Endereço</span>
            <strong id="endereco"></strong>
          </article>
        </div>
      </section>

      <section class="section message">
        <h2>Recado</h2>
        <p id="recado"></p>
      </section>
    </main>

    <script src="dados.js"></script>
    <script src="script.js"></script>
  </body>
</html>
